services:
  - type: web
    name: food-intaker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: food-intaker-db
          property: connectionString

databases:
  - name: food-intaker-db
    plan: free
