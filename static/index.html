<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Food Intaker">
  <link rel="manifest" href="/manifest.json">
  <title>Food Intaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --fg: #f5f5f5;
      --accent: #00ff00;
      --dim: #555;
      --font: "Courier New", Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--dim);
      flex-shrink: 0;
    }

    header h1 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

    #settings-btn {
      background: none;
      border: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 13px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #settings-btn:active { background: var(--dim); }

    #food-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .food-card {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      text-align: left;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .food-card:active { border-color: var(--accent); color: var(--accent); }

    .food-card .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .food-card .meta { color: var(--dim); font-size: 12px; flex-shrink: 0; margin-left: 12px; }

    .flash { border-color: var(--accent) !important; color: var(--accent) !important; }

    #quick-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #quick-btn:active { border-color: var(--fg); color: var(--fg); }

    #quick-form {
      display: none;
      border: 1px solid var(--dim);
      padding: 12px;
      margin-bottom: 8px;
    }

    #quick-form.open { display: block; }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    .form-row label { width: 70px; color: #aaa; flex-shrink: 0; font-weight: bold; }
    .form-row input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 16px;
      padding: 4px 0;
      outline: none;
    }
    .form-row input:focus { border-bottom-color: var(--accent); }

    #quick-submit {
      width: 100%;
      background: none;
      border: 1px solid var(--fg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px;
      cursor: pointer;
    }
    #quick-submit:active { background: var(--fg); color: var(--bg); }

    footer {
      border-top: 1px solid var(--dim);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    .macro-row { margin-bottom: 8px; }
    .macro-row:last-child { margin-bottom: 0; }
    .macro-row.plain { display: flex; justify-content: space-between; font-size: 13px; }
    .macro-row .key { color: var(--dim); }
    .macro-row .val { color: var(--accent); }
    .macro-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
    .macro-label .key { color: var(--dim); }
    .macro-label .val { color: var(--accent); }
    .bar { font-size: 13px; letter-spacing: 1px; color: var(--accent); overflow: hidden; white-space: nowrap; }

    /* Settings panel */
    #settings-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      flex-direction: column;
      padding: 24px 16px;
      padding-top: calc(24px + env(safe-area-inset-top));
    }
    #settings-panel.open { display: flex; }

    #settings-panel h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 24px;
    }

    #settings-panel .form-row { margin-bottom: 24px; }

    #settings-save {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    #settings-save:active { background: var(--accent); color: var(--bg); }

    #settings-close {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
    }
    #settings-close:active { background: var(--dim); color: var(--bg); }

    /* Add food panel */
    #add-food-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      flex-direction: column;
      padding: 24px 16px;
      padding-top: calc(24px + env(safe-area-inset-top));
      overflow-y: auto;
    }
    #add-food-panel.open { display: flex; }

    #add-food-panel h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 24px;
    }

    #add-food-panel .form-row { margin-bottom: 16px; }

    #add-food-save {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-bottom: 12px;
      margin-top: 8px;
    }
    #add-food-save:active { background: var(--accent); color: var(--bg); }

    #add-food-close {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
    }
    #add-food-close:active { background: var(--dim); color: var(--bg); }

    #add-food-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #add-food-btn:active { border-color: var(--fg); color: var(--fg); }

    /* Login panel */
    #login-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 20;
      flex-direction: column;
      justify-content: center;
      padding: 32px 16px;
      padding-top: calc(32px + env(safe-area-inset-top));
    }
    #login-panel.open { display: flex; }
    #login-panel h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 32px;
    }
    #login-error { color: #ff4444; font-size: 13px; margin-bottom: 8px; min-height: 18px; }
    #login-submit {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
    }
    #login-submit:active { background: var(--accent); color: var(--bg); }
  </style>
</head>
<body>

<header>
  <h1>Food Intaker</h1>
  <div style="display:flex;gap:8px;">
    <button id="settings-btn" onclick="openSettings()">[settings]</button>
    <button id="logout-btn" onclick="doLogout()">[logout]</button>
  </div>
</header>

<div id="food-list">
  <div id="cards"></div>

  <button id="add-food-btn" onclick="openAddFood()">[ + add food ]</button>
  <button id="quick-btn" onclick="toggleQuick()">[ + quick log ]</button>

  <div id="quick-form">
    <div class="form-row"><label>note</label><input id="q-note" type="text" placeholder="optional"></div>
    <div class="form-row"><label>calories</label><input id="q-cal" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>protein</label><input id="q-pro" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>carbs</label><input id="q-carb" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>fat</label><input id="q-fat" type="number" inputmode="decimal"></div>
    <button id="quick-submit" onclick="submitQuick()">[ log it ]</button>
  </div>
</div>

<footer>
  <div id="macro-bars"></div>
</footer>

<div id="add-food-panel">
  <h2>// add food</h2>
  <div class="form-row"><label>name</label><input id="f-name" type="text" placeholder="required"></div>
  <div class="form-row"><label>calories</label><input id="f-cal" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>protein</label><input id="f-pro" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>carbs</label><input id="f-carb" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>fat</label><input id="f-fat" type="number" inputmode="decimal" placeholder="per serving"></div>
  <button id="add-food-save" onclick="submitAddFood()">[ save food ]</button>
  <button id="add-food-close" onclick="closeAddFood()">[ cancel ]</button>
</div>

<div id="settings-panel">
  <h2>// settings</h2>
  <div class="form-row"><label>protein</label><input id="s-protein" type="number" inputmode="decimal" placeholder="goal (g)"></div>
  <div class="form-row"><label>calories</label><input id="s-calories" type="number" inputmode="decimal" placeholder="goal"></div>
  <div class="form-row"><label>carbs</label><input id="s-carbs" type="number" inputmode="decimal" placeholder="goal (g)"></div>
  <div class="form-row"><label>fat</label><input id="s-fat" type="number" inputmode="decimal" placeholder="goal (g)"></div>
  <button id="settings-save" onclick="saveSettings()">[ save ]</button>
  <button id="settings-close" onclick="closeSettings()">[ cancel ]</button>
</div>

<div id="login-panel">
  <h2>// food intaker</h2>
  <div class="form-row"><label>email</label><input id="l-email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com"></div>
  <div class="form-row"><label>password</label><input id="l-pass" type="password" autocomplete="current-password"></div>
  <div id="login-error"></div>
  <button id="login-submit" onclick="doLogin()">[ login ]</button>
</div>

<script>
  const BAR_LEN = 20;
  const MACROS = [
    { key: 'protein',  label: 'protein',  unit: 'g', settingKey: 'protein_target',  reportKey: 'total_protein',  inputId: 's-protein',  foodKey: 'protein_per_serving' },
    { key: 'calories', label: 'calories', unit: '',  settingKey: 'calories_target', reportKey: 'total_calories', inputId: 's-calories', foodKey: 'calories_per_serving' },
    { key: 'carbs',    label: 'carbs',    unit: 'g', settingKey: 'carbs_target',    reportKey: 'total_carbs',    inputId: 's-carbs',    foodKey: 'carbs_per_serving' },
    { key: 'fat',      label: 'fat',      unit: 'g', settingKey: 'fat_target',      reportKey: 'total_fat',      inputId: 's-fat',      foodKey: 'fat_per_serving' },
  ];
  let targets = { protein: null, calories: null, carbs: null, fat: null };
  let totals   = { protein: 0, calories: 0, carbs: 0, fat: 0 };

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${localStorage.getItem('token')}`,
    };
  }

  async function doLogin() {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    document.getElementById('login-error').textContent = '';
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    if (!res.ok) {
      const err = await res.json();
      document.getElementById('login-error').textContent = err.detail || 'Login failed';
      return;
    }
    const { token } = await res.json();
    localStorage.setItem('token', token);
    document.getElementById('login-panel').classList.remove('open');
    init();
  }

  function doLogout() {
    localStorage.removeItem('token');
    location.reload();
  }

  async function init() {
    const [foods, report, settings] = await Promise.all([
      fetch('/foods', { headers: authHeaders() }).then(r => r.json()),
      fetch('/report?start=' + todayStart(), { headers: authHeaders() }).then(r => r.json()),
      fetch('/settings', { headers: authHeaders() }).then(r => r.json()),
    ]);
    renderFoods(foods);
    MACROS.forEach(m => {
      targets[m.key] = settings[m.settingKey];
      totals[m.key]  = report[m.reportKey] || 0;
    });
    renderProgress();
  }

  function todayStart() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d.toISOString();
  }

  function renderFoods(foods) {
    const container = document.getElementById('cards');
    container.innerHTML = '';
    foods.forEach(food => {
      const btn = document.createElement('button');
      btn.className = 'food-card';
      const pro = food.protein_per_serving != null ? food.protein_per_serving + 'g pro' : '';
      const cal = food.calories_per_serving != null ? food.calories_per_serving + 'cal' : '';
      const meta = [cal, pro].filter(Boolean).join('  ');
      btn.innerHTML = `<span class="name">${food.name}</span><span class="meta">${meta}</span>`;
      btn.onclick = () => logFood(food, btn);
      container.appendChild(btn);
    });
  }

  async function logFood(food, btn) {
    await fetch('/log', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ food_id: food.id, serving: 1 }),
    });
    MACROS.forEach(m => { totals[m.key] += (food[m.foodKey] || 0); });
    renderProgress();
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 400);
  }

  function renderProgress() {
    const container = document.getElementById('macro-bars');
    const anyTarget = MACROS.some(m => targets[m.key] != null);

    if (!anyTarget) {
      container.innerHTML = MACROS.map(m => {
        const val = Math.round(totals[m.key] * 10) / 10;
        return `<div class="macro-row plain"><span class="key">${m.label} today</span><span class="val">${val}${m.unit}</span></div>`;
      }).join('');
      return;
    }

    container.innerHTML = MACROS
      .filter(m => targets[m.key] != null)
      .map(m => {
        const val = Math.round(totals[m.key] * 10) / 10;
        const pct = Math.min(totals[m.key] / targets[m.key], 1);
        const filled = Math.round(pct * BAR_LEN);
        return `<div class="macro-row">
          <div class="macro-label"><span class="key">${m.label}</span><span class="val">${val} / ${targets[m.key]}${m.unit}</span></div>
          <div class="bar">${'█'.repeat(filled)}${'░'.repeat(BAR_LEN - filled)}</div>
        </div>`;
      }).join('');
  }

  function toggleQuick() {
    document.getElementById('quick-form').classList.toggle('open');
  }

  async function submitQuick() {
    const body = {
      note:     document.getElementById('q-note').value || null,
      calories: parseFloat(document.getElementById('q-cal').value) || null,
      protein:  parseFloat(document.getElementById('q-pro').value) || null,
      carbs:    parseFloat(document.getElementById('q-carb').value) || null,
      fat:      parseFloat(document.getElementById('q-fat').value) || null,
    };
    await fetch('/log/quick', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    MACROS.forEach(m => { totals[m.key] += (body[m.key] || 0); });
    renderProgress();
    document.getElementById('quick-form').classList.remove('open');
    ['q-note','q-cal','q-pro','q-carb','q-fat'].forEach(id => document.getElementById(id).value = '');
  }

  function openAddFood() {
    document.getElementById('add-food-panel').classList.add('open');
  }

  function closeAddFood() {
    document.getElementById('add-food-panel').classList.remove('open');
    ['f-name','f-cal','f-pro','f-carb','f-fat'].forEach(id => document.getElementById(id).value = '');
  }

  async function submitAddFood() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    const body = {
      food_name: name,
      calories:  parseFloat(document.getElementById('f-cal').value) || null,
      protein:   parseFloat(document.getElementById('f-pro').value) || null,
      carbs:     parseFloat(document.getElementById('f-carb').value) || null,
      fat:       parseFloat(document.getElementById('f-fat').value) || null,
    };
    const res = await fetch('/foods', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    const food = await res.json();
    const container = document.getElementById('cards');
    const btn = document.createElement('button');
    btn.className = 'food-card';
    const pro = food.protein_per_serving != null ? food.protein_per_serving + 'g pro' : '';
    const cal = food.calories_per_serving != null ? food.calories_per_serving + 'cal' : '';
    const meta = [cal, pro].filter(Boolean).join('  ');
    btn.innerHTML = `<span class="name">${food.name}</span><span class="meta">${meta}</span>`;
    btn.onclick = () => logFood(food, btn);
    container.appendChild(btn);
    closeAddFood();
  }

  function openSettings() {
    MACROS.forEach(m => { document.getElementById(m.inputId).value = targets[m.key] || ''; });
    document.getElementById('settings-panel').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settings-panel').classList.remove('open');
  }

  async function saveSettings() {
    const body = {};
    MACROS.forEach(m => { body[m.settingKey] = parseFloat(document.getElementById(m.inputId).value) || null; });
    await fetch('/settings', {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify(body),
    });
    MACROS.forEach(m => { targets[m.key] = body[m.settingKey]; });
    renderProgress();
    closeSettings();
  }

  if (localStorage.getItem('token')) {
    init();
  } else {
    document.getElementById('login-panel').classList.add('open');
  }
</script>
</body>
</html>
