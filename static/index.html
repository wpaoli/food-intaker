<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Food Intaker">
  <link rel="manifest" href="/manifest.json">
  <title>Food Intaker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --fg: #e0e0e0;
      --accent: #00ff00;
      --dim: #555;
      --font: "Courier New", Courier, monospace;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--dim);
      flex-shrink: 0;
    }

    header h1 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

    #settings-btn {
      background: none;
      border: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 13px;
      padding: 4px 10px;
      cursor: pointer;
    }
    #settings-btn:active { background: var(--dim); }

    #food-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .food-card {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      text-align: left;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
    }
    .food-card:active { border-color: var(--accent); color: var(--accent); }

    .food-card .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .food-card .meta { color: var(--dim); font-size: 12px; flex-shrink: 0; margin-left: 12px; }

    .flash { border-color: var(--accent) !important; color: var(--accent) !important; }

    #quick-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #quick-btn:active { border-color: var(--fg); color: var(--fg); }

    #quick-form {
      display: none;
      border: 1px solid var(--dim);
      padding: 12px;
      margin-bottom: 8px;
    }

    #quick-form.open { display: block; }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    .form-row label { width: 70px; color: var(--dim); flex-shrink: 0; }
    .form-row input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid var(--dim);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      padding: 4px 0;
      outline: none;
    }
    .form-row input:focus { border-bottom-color: var(--accent); }

    #quick-submit {
      width: 100%;
      background: none;
      border: 1px solid var(--fg);
      color: var(--fg);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px;
      cursor: pointer;
    }
    #quick-submit:active { background: var(--fg); color: var(--bg); }

    footer {
      border-top: 1px solid var(--dim);
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      flex-shrink: 0;
    }

    #protein-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px;
    }
    #protein-label .key { color: var(--dim); }
    #protein-label .val { color: var(--accent); }

    #progress-bar {
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--accent);
      overflow: hidden;
      white-space: nowrap;
    }

    /* Settings panel */
    #settings-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      flex-direction: column;
      padding: 24px 16px;
      padding-top: calc(24px + env(safe-area-inset-top));
    }
    #settings-panel.open { display: flex; }

    #settings-panel h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 24px;
    }

    #settings-panel .form-row { margin-bottom: 24px; }

    #settings-save {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-bottom: 12px;
    }
    #settings-save:active { background: var(--accent); color: var(--bg); }

    #settings-close {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
    }
    #settings-close:active { background: var(--dim); color: var(--bg); }

    /* Add food panel */
    #add-food-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      flex-direction: column;
      padding: 24px 16px;
      padding-top: calc(24px + env(safe-area-inset-top));
      overflow-y: auto;
    }
    #add-food-panel.open { display: flex; }

    #add-food-panel h2 {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 24px;
    }

    #add-food-panel .form-row { margin-bottom: 16px; }

    #add-food-save {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
      margin-bottom: 12px;
      margin-top: 8px;
    }
    #add-food-save:active { background: var(--accent); color: var(--bg); }

    #add-food-close {
      width: 100%;
      background: none;
      border: 1px solid var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 12px;
      cursor: pointer;
    }
    #add-food-close:active { background: var(--dim); color: var(--bg); }

    #add-food-btn {
      width: 100%;
      background: none;
      border: 1px dashed var(--dim);
      color: var(--dim);
      font-family: var(--font);
      font-size: 14px;
      padding: 14px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    #add-food-btn:active { border-color: var(--fg); color: var(--fg); }
  </style>
</head>
<body>

<header>
  <h1>Food Intaker</h1>
  <button id="settings-btn" onclick="openSettings()">[settings]</button>
</header>

<div id="food-list">
  <div id="cards"></div>

  <button id="add-food-btn" onclick="openAddFood()">[ + add food ]</button>
  <button id="quick-btn" onclick="toggleQuick()">[ + quick log ]</button>

  <div id="quick-form">
    <div class="form-row"><label>note</label><input id="q-note" type="text" placeholder="optional"></div>
    <div class="form-row"><label>calories</label><input id="q-cal" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>protein</label><input id="q-pro" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>carbs</label><input id="q-carb" type="number" inputmode="decimal"></div>
    <div class="form-row"><label>fat</label><input id="q-fat" type="number" inputmode="decimal"></div>
    <button id="quick-submit" onclick="submitQuick()">[ log it ]</button>
  </div>
</div>

<footer>
  <div id="protein-label">
    <span class="key">protein today</span>
    <span class="val" id="protein-val">-- / --g</span>
  </div>
  <div id="progress-bar">░░░░░░░░░░░░░░░░░░░░</div>
</footer>

<div id="add-food-panel">
  <h2>// add food</h2>
  <div class="form-row"><label>name</label><input id="f-name" type="text" placeholder="required"></div>
  <div class="form-row"><label>calories</label><input id="f-cal" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>protein</label><input id="f-pro" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>carbs</label><input id="f-carb" type="number" inputmode="decimal" placeholder="per serving"></div>
  <div class="form-row"><label>fat</label><input id="f-fat" type="number" inputmode="decimal" placeholder="per serving"></div>
  <button id="add-food-save" onclick="submitAddFood()">[ save food ]</button>
  <button id="add-food-close" onclick="closeAddFood()">[ cancel ]</button>
</div>

<div id="settings-panel">
  <h2>// settings</h2>
  <div class="form-row">
    <label>target</label>
    <input id="s-target" type="number" inputmode="decimal" placeholder="protein goal (g)">
  </div>
  <button id="settings-save" onclick="saveSettings()">[ save ]</button>
  <button id="settings-close" onclick="closeSettings()">[ cancel ]</button>
</div>

<script>
  const BAR_LEN = 20;
  let proteinTarget = null;
  let proteinToday = 0;

  async function init() {
    const [foods, report, settings] = await Promise.all([
      fetch('/foods').then(r => r.json()),
      fetch('/report?start=' + todayStart()).then(r => r.json()),
      fetch('/settings').then(r => r.json()),
    ]);

    renderFoods(foods);
    proteinTarget = settings.protein_target;
    proteinToday = report.total_protein;
    renderProgress();
  }

  function todayStart() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d.toISOString();
  }

  function renderFoods(foods) {
    const container = document.getElementById('cards');
    container.innerHTML = '';
    foods.forEach(food => {
      const btn = document.createElement('button');
      btn.className = 'food-card';
      const pro = food.protein_per_serving != null ? food.protein_per_serving + 'g pro' : '';
      const cal = food.calories_per_serving != null ? food.calories_per_serving + 'cal' : '';
      const meta = [cal, pro].filter(Boolean).join('  ');
      btn.innerHTML = `<span class="name">${food.name}</span><span class="meta">${meta}</span>`;
      btn.onclick = () => logFood(food, btn);
      container.appendChild(btn);
    });
  }

  async function logFood(food, btn) {
    await fetch('/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ food_id: food.id, serving: 1 }),
    });
    proteinToday += (food.protein_per_serving || 0);
    renderProgress();
    btn.classList.add('flash');
    setTimeout(() => btn.classList.remove('flash'), 400);
  }

  function renderProgress() {
    const val = document.getElementById('protein-val');
    const bar = document.getElementById('progress-bar');
    const rounded = Math.round(proteinToday * 10) / 10;

    if (proteinTarget) {
      const pct = Math.min(proteinToday / proteinTarget, 1);
      const filled = Math.round(pct * BAR_LEN);
      val.textContent = `${rounded} / ${proteinTarget}g`;
      bar.textContent = '█'.repeat(filled) + '░'.repeat(BAR_LEN - filled);
    } else {
      val.textContent = `${rounded}g`;
      bar.textContent = '░'.repeat(BAR_LEN);
    }
  }

  function toggleQuick() {
    document.getElementById('quick-form').classList.toggle('open');
  }

  async function submitQuick() {
    const body = {
      note: document.getElementById('q-note').value || null,
      calories: parseFloat(document.getElementById('q-cal').value) || null,
      protein: parseFloat(document.getElementById('q-pro').value) || null,
      carbs: parseFloat(document.getElementById('q-carb').value) || null,
      fat: parseFloat(document.getElementById('q-fat').value) || null,
    };
    await fetch('/log/quick', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    proteinToday += (body.protein || 0);
    renderProgress();
    document.getElementById('quick-form').classList.remove('open');
    ['q-note','q-cal','q-pro','q-carb','q-fat'].forEach(id => document.getElementById(id).value = '');
  }

  function openAddFood() {
    document.getElementById('add-food-panel').classList.add('open');
  }

  function closeAddFood() {
    document.getElementById('add-food-panel').classList.remove('open');
    ['f-name','f-cal','f-pro','f-carb','f-fat'].forEach(id => document.getElementById(id).value = '');
  }

  async function submitAddFood() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return;
    const body = {
      food_name: name,
      calories: parseFloat(document.getElementById('f-cal').value) || null,
      protein: parseFloat(document.getElementById('f-pro').value) || null,
      carbs: parseFloat(document.getElementById('f-carb').value) || null,
      fat: parseFloat(document.getElementById('f-fat').value) || null,
    };
    const res = await fetch('/foods', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const food = await res.json();
    const container = document.getElementById('cards');
    const btn = document.createElement('button');
    btn.className = 'food-card';
    const pro = food.protein_per_serving != null ? food.protein_per_serving + 'g pro' : '';
    const cal = food.calories_per_serving != null ? food.calories_per_serving + 'cal' : '';
    const meta = [cal, pro].filter(Boolean).join('  ');
    btn.innerHTML = `<span class="name">${food.name}</span><span class="meta">${meta}</span>`;
    btn.onclick = () => logFood(food, btn);
    container.appendChild(btn);
    closeAddFood();
  }

  function openSettings() {
    document.getElementById('s-target').value = proteinTarget || '';
    document.getElementById('settings-panel').classList.add('open');
  }

  function closeSettings() {
    document.getElementById('settings-panel').classList.remove('open');
  }

  async function saveSettings() {
    const val = parseFloat(document.getElementById('s-target').value) || null;
    await fetch('/settings', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ protein_target: val }),
    });
    proteinTarget = val;
    renderProgress();
    closeSettings();
  }

  init();
</script>
</body>
</html>
